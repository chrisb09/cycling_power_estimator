services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: power-estimator-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: power-estimator-frontend
    ports:
      # Map the standard dev port to the internal Nginx port
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend
